<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Iron Sharpens Iron — Psalms</title>
<meta name="description" content="Iron Sharpens Iron: 30-day challenge through selected Psalms.">
<meta name="theme-color" content="#0c0a09">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0a09;color:#e7e5e4;font-family:'Crimson Pro',Georgia,serif;-webkit-font-smoothing:antialiased;min-height:100vh;
  background-image:radial-gradient(ellipse at top,rgba(120,80,40,.08) 0%,transparent 60%)}
.mono{font-family:'JetBrains Mono',monospace}
a{text-decoration:none;color:inherit}
button{background:none;border:none;cursor:pointer;font-family:inherit;color:inherit}
.wrap{max-width:512px;margin:0 auto;padding:0 20px 64px}.wrap>*+*{margin-top:20px}
.header-bg{background:linear-gradient(135deg,rgba(120,80,30,.15) 0%,transparent 50%,rgba(80,60,30,.1) 100%)}
.header-inner{max-width:512px;margin:0 auto;padding:40px 20px 24px}
.card{border-radius:16px;border:1px solid rgba(68,64,60,.4);background:rgba(28,25,23,.6);transition:all .3s;overflow:hidden}
.card:hover{border-color:rgba(68,64,60,.6)}
.card-today{border-radius:16px;border:1px solid rgba(217,119,6,.6);background:linear-gradient(to bottom,rgba(41,37,36,.9),rgba(28,25,23,.9));box-shadow:0 10px 15px -3px rgba(120,53,15,.2);overflow:hidden}
.card-done{border-radius:16px;border:1px solid rgba(68,64,60,.3);background:rgba(28,25,23,.4);opacity:.7;overflow:hidden}
.card-btn{width:100%;text-align:left;padding:16px 20px;display:flex;align-items:center;gap:16px}
.day-circle{flex-shrink:0;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
.dc-today{background:#b45309;color:#fffbeb}.dc-done{background:rgba(20,83,45,.5);color:#4ade80;border:1px solid rgba(21,128,61,.4)}.dc-def{background:#292524;color:#a8a29e}
.badge{font-size:12px;font-weight:500;padding:2px 8px;border-radius:9999px;display:inline-block}
.b-today{background:rgba(180,83,9,.4);color:#fcd34d}.b-done{background:rgba(20,83,45,.3);color:#4ade80}
.chevron{width:20px;height:20px;flex-shrink:0;color:#78716c;transition:transform .2s}.chevron-open{transform:rotate(180deg)}
.expand{padding:0 20px 20px}.expand>*+*{margin-top:16px}
.read-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px 16px;background:#b45309;color:#fffbeb;font-weight:600;font-size:14px;border-radius:12px;transition:background .2s}.read-btn:hover{background:#d97706}
.cl-box{background:rgba(41,37,36,.4);border-radius:12px;padding:16px;border:1px solid rgba(68,64,60,.3)}.cl-box>*+*{margin-top:8px}
.check-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:2px 0}
.cb{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;border:2px solid #78716c;flex-shrink:0;transition:all .2s}.cb.on{background:#b45309;border-color:#b45309}
.cl{font-size:14px;color:#e7e5e4;transition:color .2s}.cl.on{color:#78716c;text-decoration:line-through}
.pb-bg{width:100%;height:10px;background:#292524;border-radius:9999px;overflow:hidden}
.pb-fill{height:100%;background:linear-gradient(to right,#b45309,#f59e0b);border-radius:9999px;transition:width .5s}
.wd{display:flex;align-items:center;gap:12px;padding:12px 4px}.wl{height:1px;flex:1;background:rgba(68,64,60,.5)}
.ver-toggle{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;justify-content:center}
.ver-btn{font-size:12px;font-weight:600;padding:4px 10px;border-radius:8px;border:1px solid rgba(68,64,60,.4);color:#a8a29e;transition:all .2s;font-family:'JetBrains Mono',monospace}
.ver-btn:hover{border-color:rgba(180,83,9,.4);color:#fde68a}.ver-btn.active{background:rgba(180,83,9,.3);border-color:rgba(180,83,9,.5);color:#fcd34d}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}.anim{animation:fadeIn .25s ease-out}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 20px rgba(180,120,40,.15)}50%{box-shadow:0 0 35px rgba(180,120,40,.25)}}.glow{animation:pulseGlow 4s ease-in-out infinite}
</style>
</head>
<body>
<header class="header-bg">
<div class="header-inner">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <div style="width:40px;height:40px;border-radius:12px;background:rgba(120,53,15,.3);border:1px solid rgba(180,83,9,.4);display:flex;align-items:center;justify-content:center"><span style="font-size:20px">⚔️</span></div>
    <div>
      <h1 style="font-size:24px;font-weight:700;color:#fffbeb;line-height:1.25;letter-spacing:-.025em">Iron Sharpens Iron</h1>
      <p class="mono" style="font-size:12px;color:#a8a29e;font-weight:500;letter-spacing:.025em">PSALMS — 30-DAY CHALLENGE</p>
    </div>
  </div>
  <a href="https://sharpiron.org" target="_blank" rel="noopener noreferrer" style="font-size:14px;color:#a8a29e;line-height:1.625;display:inline-flex;align-items:center;gap:6px">sharpiron.org <svg style="width:12px;height:12px;color:#78716c" viewBox="0 0 16 16" fill="none"><path d="M5 3h8v8M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
</div>
</header>
<div class="wrap" id="app"></div>
<script>
var DAYS=[
{day:1,reading:"Psalm 1",topic:"The Two Paths",ph:1,summary:"The righteous man delights in the law of the Lord. He is like a tree planted by streams of water. The wicked are like chaff the wind drives away. Two paths, two destinies."},
{day:2,reading:"Psalm 5",topic:"A Prayer for Protection",summary:"David cries out to God in the morning. The Lord hates wickedness. \u2018Lead me, O Lord, in your righteousness \u2014 make your way straight before me.\u2019"},
{day:3,reading:"Psalm 15",topic:"Who May Dwell with God?",summary:"Lord, who may live on your holy mountain? He who walks blamelessly, speaks truth in his heart, and keeps his oath even when it hurts."},
{day:4,reading:"Psalm 19",topic:"The Heavens Declare God\u2019s Glory",summary:"The heavens declare the glory of God. The law of the Lord is perfect, reviving the soul. \u2018Let the words of my mouth and the meditation of my heart be acceptable in your sight.\u2019"},
{day:5,reading:"Psalm 23",topic:"The Lord Is My Shepherd",summary:"The Lord is my shepherd; I shall not want. He leads me beside still waters and restores my soul. Even through the valley of the shadow of death \u2014 I will fear no evil."},
{day:6,reading:"Psalm 25",topic:"Teach Me Your Paths",summary:"To you, O Lord, I lift up my soul. Show me your ways, teach me your paths. Guard my life and rescue me \u2014 I take refuge in you."},
{day:7,reading:"Psalm 27",topic:"The Lord Is My Light",summary:"The Lord is my light and my salvation \u2014 whom shall I fear? One thing I ask: to dwell in the house of the Lord all the days of my life. Wait for the Lord; be strong."},
{day:8,reading:"Psalm 32",topic:"The Joy of Forgiveness",ph:2,summary:"Blessed is the one whose transgression is forgiven. When David kept silent, his bones wasted away. He confessed \u2014 and the Lord forgave. Be glad in the Lord, you righteous."},
{day:9,reading:"Psalm 34",topic:"Taste and See",summary:"I sought the Lord and He answered me. \u2018Oh, taste and see that the Lord is good!\u2019 The righteous cry out and the Lord hears them. He is close to the brokenhearted."},
{day:10,reading:"Psalm 37",topic:"Trust and Do Not Fret",summary:"Do not fret because of evildoers. Trust in the Lord and do good. Delight yourself in the Lord, and He will give you the desires of your heart. Commit your way to Him."},
{day:11,reading:"Psalm 42",topic:"Thirsting for God",summary:"As the deer pants for flowing streams, so pants my soul for you, O God. \u2018Why are you cast down, O my soul? Hope in God, for I shall again praise Him.\u2019"},
{day:12,reading:"Psalm 46",topic:"God Is Our Refuge",summary:"God is our refuge and strength, a very present help in trouble. Therefore we will not fear. \u2018Be still, and know that I am God.\u2019"},
{day:13,reading:"Psalm 51",topic:"Create in Me a Clean Heart",summary:"David\u2019s prayer after his sin with Bathsheba. \u2018Against you, you only, have I sinned.\u2019 Create in me a clean heart, O God. Restore the joy of your salvation."},
{day:14,reading:"Psalm 56",topic:"When I Am Afraid, I Trust",summary:"When I am afraid, I put my trust in you. In God, whose word I praise \u2014 what can man do to me? You have kept count of my tossings; you put my tears in your bottle."},
{day:15,reading:"Psalm 62",topic:"My Soul Waits for God Alone",ph:3,summary:"For God alone my soul waits in silence; from Him comes my salvation. He alone is my rock. Trust in Him at all times. Pour out your heart before Him."},
{day:16,reading:"Psalm 63",topic:"Seeking God in the Wilderness",summary:"O God, you are my God; earnestly I seek you. My soul thirsts for you in a dry and weary land. Your steadfast love is better than life."},
{day:17,reading:"Psalm 73",topic:"The Prosperity of the Wicked",summary:"Asaph nearly stumbles watching the wicked prosper. Then he enters the sanctuary and understands their end. \u2018Whom have I in heaven but you?\u2019 God is the strength of my heart."},
{day:18,reading:"Psalm 77",topic:"Remembering God\u2019s Works",summary:"In the day of trouble I seek the Lord. Has God forgotten to be gracious? Then I remember His deeds \u2014 the wonders of old. You are the God who works wonders."},
{day:19,reading:"Psalm 82",topic:"God Judges the Judges",summary:"God takes His stand in the divine council. \u2018How long will you judge unjustly?\u2019 Defend the weak and fatherless. Rescue the weak and needy. Rise up, O God, judge the earth."},
{day:20,reading:"Psalm 84",topic:"How Lovely Is Your Dwelling Place",summary:"My soul longs for the courts of the Lord. Blessed are those whose strength is in you. A day in your courts is better than a thousand elsewhere. The Lord bestows favor and honor."},
{day:21,reading:"Psalm 90",topic:"Teach Us to Number Our Days",summary:"Lord, you have been our dwelling place in all generations. Our days pass away under your wrath. \u2018Teach us to number our days that we may get a heart of wisdom.\u2019"},
{day:22,reading:"Psalm 91",topic:"Under the Shadow of the Almighty",ph:4,summary:"He who dwells in the shelter of the Most High will abide in the shadow of the Almighty. A thousand may fall at your side \u2014 it will not come near you. He will command His angels concerning you."},
{day:23,reading:"Psalm 100",topic:"Shout for Joy",summary:"Make a joyful noise to the Lord, all the earth! Know that the Lord, He is God. Enter His gates with thanksgiving. His steadfast love endures forever."},
{day:24,reading:"Psalm 103",topic:"Bless the Lord, O My Soul",summary:"Bless the Lord, O my soul, and forget not all His benefits. He forgives, heals, redeems, crowns you with steadfast love. As a father shows compassion to his children, so the Lord."},
{day:25,reading:"Psalm 121",topic:"My Help Comes from the Lord",summary:"I lift up my eyes to the hills. From where does my help come? My help comes from the Lord, who made heaven and earth. He will not let your foot be moved. He who keeps you will not slumber."},
{day:26,reading:"Psalm 127",topic:"Unless the Lord Builds the House",summary:"Unless the Lord builds the house, those who build it labor in vain. Unless the Lord watches over the city, the watchman stays awake in vain. Children are a heritage from the Lord."},
{day:27,reading:"Psalm 139",topic:"Fearfully and Wonderfully Made",summary:"O Lord, you have searched me and known me. Where shall I go from your Spirit? I am fearfully and wonderfully made. \u2018Search me, O God, and know my heart.\u2019"},
{day:28,reading:"Psalm 142",topic:"A Cry from the Cave",summary:"David\u2019s prayer from the cave. \u2018I cry to you, O Lord; I say, you are my refuge.\u2019 No one cares for my soul \u2014 but you, Lord. Set me free from my prison."},
{day:29,reading:"Psalm 144",topic:"Blessed Be the Lord, My Rock",summary:"Blessed be the Lord, my rock, who trains my hands for war and my fingers for battle. He is my steadfast love and my fortress, my stronghold and my deliverer."},
{day:30,reading:"Psalm 150",topic:"Let Everything Praise the Lord",summary:"Praise the Lord! Praise Him with trumpet, lute, harp, tambourine, strings, pipe, and cymbals. Let everything that has breath praise the Lord!"}
];

var WV={
1:{r:“Psalm 19:1”,t:“The heavens declare the glory of God, and the sky above proclaims his handiwork.”},
8:{r:“Psalm 51:10”,t:“Create in me a clean heart, O God, and renew a right spirit within me.”},
15:{r:“Psalm 84:11”,t:“For the Lord God is a sun and shield; the Lord bestows favor and honor. No good thing does he withhold from those who walk uprightly.”},
22:{r:“Psalm 139:23\u201324”,t:“Search me, O God, and know my heart! Try me and know my thoughts! And see if there be any grievous way in me, and lead me in the way everlasting!”}
};

var CHECKS=[
{k:“read”,l:“Read the passage”},
{k:“pray”,l:“Pray & journal”},
{k:“workout”,l:“Workout (3\u20135x/week)”},
{k:“danger”,l:“Stay Dangerous (1x/phase)”},
{k:“abstain”,l:“Abstain from your one thing”},
{k:“marco”,l:“Marco Polo update”}
];
var CHECK_KEYS=CHECKS.map(function(c){return c.k});

var SKB=“isi-psalms-v1”;
var now=new Date();var S=new Date(now.getFullYear(),now.getMonth(),1);
var SK=SKB+”-”+now.getFullYear()+”-”+(now.getMonth()+1);
var VERS=[“ESV”,“NASB”,“NKJV”,“NIV”,“LSB”];
var VK=“isi-version”;
function gver(){try{var v=localStorage.getItem(VK);return VERS.indexOf(v)>=0?v:“ESV”}catch(e){return”ESV”}}
function sver(v){try{localStorage.setItem(VK,v)}catch(e){}}
var bv=gver();

function gd(){var d=new Date().getDate();return Math.min(d,30)}
function ia(){return true}
function iu(){return false}
function gv(d){for(var i=0,b=[22,15,8,1];i<b.length;i++)if(d>=b[i])return WV[b[i]];return WV[1]}
function lc(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch(e){return{}}}
function sc(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}}

var cl=lc(),ed=null,sa=false,cd=gd(),act=ia(),first=true;

function allDone(ch){for(var i=0;i<CHECK_KEYS.length;i++)if(!ch[CHECK_KEYS[i]])return false;return true}

function render(){
var a=document.getElementById(“app”),h=””,v=gv(cd),td=DAYS[cd-1];

if(iu())h+=’<div style="border-radius:16px;background:rgba(120,53,15,.2);border:1px solid rgba(180,83,9,.3);padding:20px;text-align:center"><p style="font-size:18px;font-weight:600;color:#fde68a">Psalms Challenge starts on the 1st</p><p style="font-size:14px;color:#a8a29e;margin-top:4px">30 Psalms. Prayers, praise, and raw honesty before God. Let\u2019s go, men.</p></div>’;

if(act&&td){
h+=’<div class="glow" style="border-radius:16px;border:1px solid rgba(217,119,6,.4);background:linear-gradient(to bottom right,rgba(41,37,36,.8),rgba(28,25,23,.9),rgba(28,25,23,1));padding:20px">’;
h+=’<div style="display:flex;align-items:center;justify-content:space-between"><div>’;
h+=’<p class="mono" style="font-size:12px;font-weight:600;color:#f59e0b;text-transform:uppercase;letter-spacing:.05em">Day ‘+cd+’ of 30 \u2014 Today</p>’;
h+=’<h2 style="font-size:20px;font-weight:700;color:#fffbeb;margin-top:4px">’+td.reading+’</h2>’;
h+=’<p style="font-size:14px;color:#a8a29e;margin-top:2px">’+td.topic+’</p></div>’;
h+=’<div style="width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(120,53,15,.3);border:2px solid rgba(180,83,9,.5)"><span style="font-size:24px;font-weight:700;color:#fcd34d">’+cd+’</span></div></div>’;
h+=’<a href="https://www.biblegateway.com/passage/?search='+encodeURIComponent(td.reading)+'&version='+bv+'" target="_blank" rel="noopener noreferrer" class="read-btn" style="margin-top:16px">\uD83D\uDCD6 Open Today\u2019s Reading</a>’;
h+=’<div class="ver-toggle">’;for(var vi=0;vi<VERS.length;vi++)h+=’<button class="ver-btn'+(VERS[vi]===bv?' active':'')+'" onclick="sv(\''+VERS[vi]+'\')">’+VERS[vi]+’</button>’;
h+=’</div></div>’;
}

if(v){h+=’<div style="border-radius:16px;background:rgba(28,25,23,.8);border:1px solid rgba(68,64,60,.4);padding:20px">’;
h+=’<p class="mono" style="font-size:12px;font-weight:600;color:#78716c;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">This Phase\u2019s Memory Verse</p>’;
h+=’<p style="font-size:16px;font-style:italic;line-height:1.625;color:#e7e5e4">\u201C’+v.t+’\u201D</p>’;
h+=’<p style="font-size:14px;font-weight:600;color:#f59e0b;margin-top:8px">\u2014 ‘+v.r+’</p></div>’}

var dayPr=act?Math.round(cd/30*100):(iu()?0:100);
h+=’<div style="border-radius:16px;background:rgba(28,25,23,.6);border:1px solid rgba(68,64,60,.3);padding:20px">’;
h+=’<div style="display:flex;justify-content:space-between;align-items:center"><p class="mono" style="font-size:12px;font-weight:600;color:#78716c;text-transform:uppercase;letter-spacing:.05em">Challenge Progress</p><span style="font-size:14px;font-weight:500;color:#a8a29e">Day ‘+cd+’ of 30</span></div>’;
h+=’<div class="pb-bg" style="margin-top:12px"><div class="pb-fill" style="width:'+dayPr+'%"></div></div>’;
h+=’<p style="font-size:12px;color:#78716c;margin-top:12px">’+(30-cd)+’ days remaining</p></div>’;

h+=’<div>’;
h+=’<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h2 style="font-size:18px;font-weight:700;color:#e7e5e4">Reading Schedule</h2>’;
h+=’<button onclick="tsa()" style="font-size:12px;font-weight:500;color:#f59e0b;padding:4px 0">’+(sa?“Show less”:“Show all 30 days”)+’</button></div>’;

var vis=sa?DAYS:DAYS.slice(0,Math.min(cd+2,30));
for(var i=0;i<vis.length;i++){
var d=vis[i];
if(d.ph&&d.day>1){var wv=WV[d.day]||{};
h+=’<div class="wd"><div class="wl"></div><span class="mono" style="font-size:12px;color:#78716c;font-weight:600;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap">Phase ‘+d.ph+(wv?’ \u2022 Memorize: ‘+wv.r:’’)+’</span><div class="wl"></div></div>’}
h+=rd(d);
}
h+=’</div>’;

h+=’<footer style="padding-top:32px;padding-bottom:8px;display:flex;align-items:center;justify-content:center;gap:12px;color:#57534e">’;
h+=’<span style="font-size:12px;font-style:italic">\u201CAs iron sharpens iron, so one person sharpens another.\u201D</span>’;
h+=’<span style="color:#44403c">\u2022</span><span style="font-size:12px">Proverbs 27:17</span></footer>’;

a.innerHTML=h;
if(first&&act){first=false;ed=cd;render()}
}

function rd(d){
var dk=“day-”+d.day,ch=cl[dk]||{},ad=allDone(ch),it=act&&d.day===cd,io=ed===d.day;
var cls=it?“card-today”:ad?“card-done”:“card”;
var h=’<div class="'+cls+'" style="margin-top:12px"><button class="card-btn" onclick="td2('+d.day+')">’;
h+=’<div class=“day-circle ‘+(it?“dc-today”:ad?“dc-done”:“dc-def”)+’”>’+(ad?”\u2713”:d.day)+’</div>’;
h+=’<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">’;
h+=’<span style=“font-weight:600;font-size:16px;color:’+(it?”#fef3c7”:”#e7e5e4”)+’”>’+d.reading+’</span>’;
if(it)h+=’<span class="badge b-today">TODAY</span>’;
if(ad&&!it)h+=’<span class="badge b-done">DONE</span>’;
h+=’</div><p style="font-size:14px;color:#a8a29e;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">’+d.topic+’</p></div>’;
h+=’<svg class=“chevron’+(io?” chevron-open”:””)+’” viewBox=“0 0 20 20” fill=“currentColor”><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>’;
h+=’</button>’;

if(io){
h+=’<div class="expand anim"><div style="border-top:1px solid rgba(68,64,60,.5);padding-top:16px"></div>’;
h+=’<p style="font-size:14px;line-height:1.625;color:#d6d3d1">’+d.summary+’</p>’;
h+=’<a href="https://www.biblegateway.com/passage/?search='+encodeURIComponent(d.reading)+'&version='+bv+'" target="_blank" rel="noopener noreferrer" class="read-btn">\uD83D\uDCDC Read ‘+d.reading+’ (’+bv+’)</a>’;
h+=’<div class="cl-box">’;
h+=’<p class="mono" style="font-size:12px;font-weight:600;color:#78716c;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Daily Checklist</p>’;
for(var ci=0;ci<CHECKS.length;ci++)h+=rc(dk,CHECKS[ci].k,CHECKS[ci].l,ch);
h+=’</div></div>’;
}
h+=’</div>’;return h;
}

function rc(dk,f,lb,ch){
var on=!!ch[f];
return ‘<button class="check-btn" onclick="tc(\''+dk+'\',\''+f+'\')"><span class=“cb’+(on?” on”:””)+’”>’+
(on?’<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>’:””)+
‘</span><span class=“cl’+(on?” on”:””)+’”>’+lb+’</span></button>’;
}

function td2(n){ed=ed===n?null:n;render()}
function tsa(){sa=!sa;render()}
function tc(dk,f){if(!cl[dk])cl[dk]={};cl[dk][f]=!cl[dk][f];sc(cl);render()}
function sv(v){bv=v;sver(v);render()}
render();
</script>

</body>
</html>
